<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Control de Ventas</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="container">

            <h1>Resumen</h1>

            <div class="cards">
                <div class="card">
                    <p id="ganancias">$0</p>
                    <h2>Ganancias</h2>
                </div>
                <div class="card">
                    <p id="ingresos">$0</p>
                    <h2>Ingresos</h2>
                    
                </div>
                <div class="card">
                    <p id="costos">$0</p>
                    <h2>Costos</h2>
                </div>
            </div>
            <button id="nuevaVenta" class="boton" type="button">Nueva venta</button>

            <h2>Ventas</h2>

            <table class="tabla">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Costo</th>
                        <th>Ganancia</th>
                    </tr>
                </thead>
                <tbody id="tablaVentas">
                </tbody>
            </table>
        </div>
        <script src="script.js"></script>
    </body>
</html>
